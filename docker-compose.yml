name: expense-approval-prod

services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-expense_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-5000}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    command: sh -c "npm run migrate:deploy && npm run start"

  client:
    build: ./client
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-4173}:80"

volumes:
  postgres_data:

