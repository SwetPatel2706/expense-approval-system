name: expense-approval-dev

services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-expense_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: ${SERVER_PORT:-5000}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    command: sh -c "npm ci && npx prisma generate && npm run migrate:deploy && npm run dev"
    ports:
      - "5001:5000"

  client:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://server:5000
    depends_on:
      - server
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  postgres_data_dev:

